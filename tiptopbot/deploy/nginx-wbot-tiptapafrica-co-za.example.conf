# TAPTAP_sauth — dedicated WhatsApp bot VPS
# Domain: wbot.tiptapafrica.co.za → 167.71.44.10 (TIPTAP SOUTH BOT)
#
# Laravel (SA app VPS) .env:
#   WHATSAPP_BOT_NOTIFY_URL=https://wbot.tiptapafrica.co.za/notify
#
# Meta webhook (forwarder mode): https://tiptapafrica.co.za/api/whatsapp/webhook
# Meta webhook (direct mode):     https://wbot.tiptapafrica.co.za/webhook
#
# Install:
#   sudo cp deploy/nginx-wbot-tiptapafrica-co-za.example.conf /etc/nginx/sites-available/wbot.tiptapafrica.co.za
#   sudo ln -sf /etc/nginx/sites-available/wbot.tiptapafrica.co.za /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d wbot.tiptapafrica.co.za

server {
    listen 80;
    server_name wbot.tiptapafrica.co.za;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wbot.tiptapafrica.co.za;

    # certbot fills these after: sudo certbot --nginx -d wbot.tiptapafrica.co.za
    # ssl_certificate /etc/letsencrypt/live/wbot.tiptapafrica.co.za/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wbot.tiptapafrica.co.za/privkey.pem;

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /webhook {
        proxy_pass http://127.0.0.1:3000/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /inbound {
        proxy_pass http://127.0.0.1:3000/inbound;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /notify {
        proxy_pass http://127.0.0.1:3000/notify;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
